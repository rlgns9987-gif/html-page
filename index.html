<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매경테스트 합격 패스</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --accent: #27ae60;
            --bg: #f8f9fa;
            --disabled: #bdc3c7; /* 비활성화 색상 */
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .main-container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 480px;
        }

        .logo {
            font-size: 2.2em;
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--primary);
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        /* 비밀번호 입력 영역 */
        .auth-section {
            background: #f1f3f5;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .auth-label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--secondary);
        }

        .pw-input {
            width: 80%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        .pw-input:focus {
            border-color: var(--primary);
        }

        #auth-msg {
            margin-top: 10px;
            font-size: 0.9em;
            min-height: 1.2em;
        }

        /* 메뉴 리스트 */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            display: block;
            padding: 20px;
            text-decoration: none;
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.3s;
            /* 초기 상태: 비활성화 */
            background-color: var(--disabled);
            pointer-events: none;
            opacity: 0.6;
        }

        /* 활성화 상태 (Active) */
        .menu-btn.active {
            pointer-events: auto;
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .menu-btn.active:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        /* 버튼별 고유 색상 (활성화 되었을 때만 적용) */
        .active.btn-note { background-color: #f39c12; }
        .active.btn-metena { background-color: #9b59b6; }
        .active.btn-exam { background-color: var(--primary); }

        .footer {
            margin-top: 30px;
            font-size: 0.85em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div style="height:50px;margin:10px 0;display: flex;align-items: center;justify-content: center;"><a href="https://www.moduedu.kr/direct2">학점은행제 상담 링크</a></div>
    <div class="subtitle">매경테스트 단기 합격 패스</div>

    <div class="auth-section">
        <label class="auth-label">학습자 인증 코드</label>
        <input type="password" id="pwInput" class="pw-input" placeholder="인증 코드를 입력하세요" oninput="validatePW()">
        <div id="auth-msg"></div>
    </div>

    <div class="menu-list">
        <a href="study.html" id="btn-note" class="menu-btn btn-note">📚 핵심 요약노트 보기</a>
        <a href="https://www.youtube.com/@mk_maethena/videos" id="btn-metena" target="_blank" class="menu-btn btn-metena">📺 메테나 유튜브 채널</a>
        <a href="exam.html" id="btn-exam" class="menu-btn btn-exam">📝 실전 모의고사 (80문항)</a>
    </div>
</div>

<script>
    // 설정할 비밀번호 (원하시는 비밀번호로 변경하세요)
    const SECRET_PW = "5324";

    function validatePW() {
        const input = document.getElementById('pwInput').value;
        const msg = document.getElementById('auth-msg');
        const btns = document.querySelectorAll('.menu-btn');
        const inputField = document.getElementById('pwInput');

        if (input === SECRET_PW) {
            // 인증 성공
            msg.innerText = "✅ 인증되었습니다. 학습을 시작하세요!";
            msg.style.color = "#27ae60";
            inputField.style.borderColor = "#27ae60";
            
            // 모든 버튼 활성화
            btns.forEach(btn => btn.classList.add('active'));
        } else if (input.length > 0) {
            // 인증 실패 (입력 중)
            msg.innerText = "❌ 코드가 일치하지 않습니다.";
            msg.style.color = "#e74c3c";
            inputField.style.borderColor = "#e74c3c";
            
            // 모든 버튼 비활성화 유지
            btns.forEach(btn => btn.classList.remove('active'));
        } else {
            // 입력창이 비었을 때
            msg.innerText = "";
            inputField.style.borderColor = "#ddd";
            btns.forEach(btn => btn.classList.remove('active'));
        }
    }
</script>

</body>
</html>
